# Wiki2Ban - Fail2Ban jail configuration
# Copy this file to /etc/fail2ban/jail.d/wiki2ban.conf
# or merge its contents into /etc/fail2ban/jail.local

[wiki2ban]
# Enable this jail
enabled  = true

# Ports to block on ban
port     = http,https

# Filter definition (see filter.d/w2bfilter.conf)
filter   = w2bfilter

# Path to the log file defined in Wiki2Ban's LocalSettings.php configuration
# Must match the value of $wgW2BLogFilePath
logpath  = /var/log/mediawiki/wiki2ban.log

# Ban trigger: 5 failed attempts within 60 seconds
# For production wikis consider stricter values, e.g.:
#   maxretry = 3
#   findtime = 300
maxretry = 5
findtime = 60

# Base ban duration: 10 minutes
# With progressive banning enabled below, this doubles on each repeat offence
bantime  = 600

# Progressive banning (requires Fail2Ban >= 0.10)
# Each repeated offence multiplies the ban duration:
# 1st ban: 10 min, 2nd: 20 min, 3rd: 40 min, ... up to 1 week maximum
bantime.increment  = true
bantime.multiplier = 2
bantime.maxtime    = 604800